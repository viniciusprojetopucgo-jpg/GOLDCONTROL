<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>GoldControl - Premium</title>
    <style>
        :root { --gold: #d4af37; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        h1 { color: var(--gold); text-align: center; margin-bottom: 30px; }
        
        /* Formulário */
        .form-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; padding: 20px; background: #fafafa; border-radius: 8px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; transition: 0.3s; }
        .btn-add { background: var(--gold); color: white; font-weight: bold; width: 100%; grid-column: 1 / -1; }
        
        /* --- NOVO CSS ADICIONADO --- */
        .preco-destaque {
            color: #d4af37; /* Tom dourado */
            font-weight: bold;
            font-size: 1.1em;
            margin: 0;
            display: block;
        }

        .detalhes-joia {
            color: #888;
            font-size: 0.9em;
            text-align: center;
        }

        .divisor {
            color: #ccc;
            margin-left: 2px;
            font-weight: normal;
        }
        /* --------------------------- */

        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--gold); color: white; padding: 15px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .foto-preview { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; background: #eee; }
        
        .btn-edit { background: #f1c40f; color: white; margin-right: 5px; }
        .btn-delete { background: #e74c3c; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>💎 GoldControl - Gestão de Joias</h1>

    <div class="form-group" id="form-joia">
        <input type="hidden" id="joia-id">
        <input type="text" id="nome" placeholder="Nome da Joia">
        <select id="categoria">
            <option value="">Categoria</option>
            <option value="Anel">Anel</option>
            <option value="Pulseira">Pulseira</option>
            <option value="Corrente">Corrente</option>
            <option value="Pingente">Pingente</option>
        </select>
        <input type="number" id="peso" placeholder="Peso (g)" step="0.01">
        <input type="number" id="preco" placeholder="Preço (R$)">
        <input type="text" id="fotoUrl" placeholder="URL da Foto">
        <select id="status">
            <option value="DISPONIVEL">Disponível</option>
            <option value="RESERVADO">Reservado</option>
            <option value="VENDIDO">Vendido</option>
            <option value="REFINO">Refino</option>
        </select>
        <button class="btn-add" onclick="salvarJoia()">Salvar Joia</button>
    </div>

    <table id="tabela-joias">
        <thead>
            <tr>
                <th>Foto</th>
                <th>Nome e Categoria</th>
                <th style="text-align: center;">Valor e Peso</th>
                <th>Status</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const API_URL = '/joias';

    async function carregarJoias() {
        const res = await fetch(API_URL);
        const joias = await res.json();
        const tbody = document.querySelector('#tabela-joias tbody');
        tbody.innerHTML = '';

        joias.forEach(j => {
            // Formatação do preço para Real Brasileiro
            const precoFormatado = j.precoFixo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            
            // Renderização da linha da tabela com o novo design de Valor e Peso
            tbody.innerHTML += `
                <tr>
                    <td><img src="${j.fotoUrl || 'https://via.placeholder.com/60'}" class="foto-preview"></td>
                    <td>
                        <strong>${j.nome}</strong><br>
                        <small style="color: #888;">${j.categoria || 'Sem categoria'}</small>
                    </td>
                    <td class="detalhes-joia">
                        <p class="preco-destaque">${precoFormatado}</p>
                        <p style="margin:0;">${j.peso}g <span class="divisor">|</span></p>
                    </td>
                    <td>${j.status}</td>
                    <td>
                        <button class="btn-edit" onclick="preencherForm(${JSON.stringify(j).replace(/"/g, '&quot;')})">Editar</button>
                        <button class="btn-delete" onclick="excluirJoia(${j.id})">Excluir</button>
                    </td>
                </tr>`;
        });
    }

    async function salvarJoia() {
        const id = document.getElementById('joia-id').value;
        const dados = {
            nome: document.getElementById('nome').value,
            categoria: document.getElementById('categoria').value,
            peso: document.getElementById('peso').value,
            precoFixo: document.getElementById('preco').value,
            status: document.getElementById('status').value,
            fotoUrl: document.getElementById('fotoUrl').value
        };

        const metodo = id ? 'PUT' : 'POST';
        const url = id ? `${API_URL}/${id}` : API_URL;

        await fetch(url, {
            method: metodo,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(dados)
        });

        limparForm();
        carregarJoias();
    }

    async function excluirJoia(id) {
        if(confirm("Deseja realmente excluir esta joia?")) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            carregarJoias();
        }
    }

    function preencherForm(j) {
        document.getElementById('joia-id').value = j.id;
        document.getElementById('nome').value = j.nome;
        document.getElementById('categoria').value = j.categoria || '';
        document.getElementById('peso').value = j.peso;
        document.getElementById('preco').value = j.precoFixo;
        document.getElementById('status').value = j.status;
        document.getElementById('fotoUrl').value = j.fotoUrl || '';
    }

    function limparForm() {
        document.querySelectorAll('input').forEach(i => i.value = '');
        document.getElementById('joia-id').value = '';
        document.getElementById('categoria').value = '';
        document.getElementById('status').value = 'DISPONIVEL';
    }

    carregarJoias();
</script>
</body>
</html>
