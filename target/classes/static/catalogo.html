<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoldControl - Coleção Exclusiva</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --dark-gold: #b8860b;
            --bg: #fcfcfc; 
        }

        body { 
            font-family: 'Playfair Display', serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 0; 
            text-align: center; 
        }
        
        /* Layout do Topo */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 5%;
            max-width: 1300px;
            margin: 0 auto;
        }

        .logo-box {
            width: 180px; 
            height: 80px;
            background: #f0f0f0; 
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            overflow: hidden;
        }

        .logo-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .header-text {
            flex-grow: 1;
            text-align: center;
            margin-right: 180px; /* Equilibra o espaço da logo para centralizar o texto */
        }

        @media (max-width: 768px) {
            .header-container { flex-direction: column; }
            .header-text { margin-right: 0; margin-top: 20px; }
        }

        /* Estilo dos Botões de Filtro */
        .filtros { margin: 30px 0 40px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn-filtro { 
            background: white; 
            border: 1px solid var(--gold); 
            color: #333; 
            padding: 8px 20px; 
            border-radius: 20px; 
            cursor: pointer; 
            transition: 0.3s;
            font-family: 'Playfair Display', serif;
            font-weight: 600;
        }
        .btn-filtro:hover { background: var(--gold); color: white; }
        
        /* Grid de Produtos */
        .catalogo-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 20px;
        }

        /* Estilo do Card */
        .joia-card { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            transition: 0.3s;
            text-align: center; 
            border: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .joia-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .joia-card img { 
            width: 100%; 
            height: 250px; 
            object-fit: contain; 
            border-radius: 10px; 
            background: #f9f9f9;
        }
        
        .joia-card h3 { 
            color: #333; 
            font-size: 1.1em; 
            margin: 15px 0 10px; 
            text-transform: uppercase; 
            font-weight: 600;
            letter-spacing: 1px;
        }

        .preco-destaque { 
            color: var(--gold); 
            font-weight: bold; 
            font-size: 1.5em; 
            margin: 10px 0; 
            display: block;
        }

        .detalhes-joia { 
            color: #888; 
            font-size: 0.9em; 
            margin-bottom: 15px;
            display: block;
        }

        /* Botão de WhatsApp para chamar atenção */
        .btn-contato {
            display: inline-block;
            background-color: #25d366;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9em;
            transition: 0.3s;
        }
        .btn-contato:hover { background-color: #128c7e; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="logo-box">
            <img src="imagens/sua_logo.png" alt="Logo GoldControl">
        </div>

        <div class="header-text">
            <h1 style="color: var(--gold); margin: 0; font-size: 2.2em; letter-spacing: 2px;">✨ Nossa Coleção Exclusiva</h1>
            <p style="color: #666; font-style: italic; margin-top: 5px;">A elegância que você merece, em cada detalhe.</p>
        </div>
    </div>

    <div class="filtros">
        <button onclick="filtrar('TUDO')" class="btn-filtro">Todos</button>
        <button onclick="filtrar('ANEL')" class="btn-filtro">Anéis</button>
        <button onclick="filtrar('PULSEIRA')" class="btn-filtro">Pulseiras</button>
        <button onclick="filtrar('CORRENTE')" class="btn-filtro">Correntes</button>
        <button onclick="filtrar('PINGENTE')" class="btn-filtro">Pingentes</button>
    </div>

    <div class="catalogo-container" id="catalogo"></div>

    <script>
        function filtrar(categoriaSelecionada) {
            const todosOsCards = document.querySelectorAll('.joia-card');
            
            todosOsCards.forEach(card => {
                const categoriaCard = card.getAttribute('data-categoria');
                if (categoriaSelecionada === 'TUDO' || categoriaCard === categoriaSelecionada) {
                    card.style.display = "flex";
                } else {
                    card.style.display = "none";
                }
            });
        }

        async function carregarCatalogo() {
            try {
                const response = await fetch('/joias');
                const joias = await response.json();
                const container = document.getElementById('catalogo');
                container.innerHTML = '';

                const disponiveis = joias.filter(j => j.status === 'DISPONIVEL');

                if (disponiveis.length === 0) {
                    container.innerHTML = '<p style="grid-column: 1/-1; color: #999;">No momento, todas as nossas peças exclusivas foram reservadas.</p>';
                    return;
                }

                disponiveis.forEach(j => {
                    const precoFormatado = j.precoFixo.toLocaleString('pt-BR', { 
                        style: 'currency', 
                        currency: 'BRL' 
                    });
                    
                    const card = document.createElement('div');
                    card.className = 'joia-card';
                    card.setAttribute('data-categoria', j.categoria); 

                    // Link do WhatsApp dinâmico com o nome da joia
                    const mensagemWhats = encodeURIComponent(`Olá! Tenho interesse na joia: ${j.nome}`);
                    const linkWhatsApp = `https://wa.me/5524999999999?text=${mensagemWhats}`; // Ajuste o número

                    card.innerHTML = `
                        <div>
                            <img src="${j.fotoUrl || 'https://via.placeholder.com/250'}" alt="${j.nome}">
                            <h3>${j.nome}</h3>
                            <span class="preco-destaque">${precoFormatado}</span>
                            <span class="detalhes-joia">${j.peso}g</span>
                        </div>
                        <a href="${linkWhatsApp}" target="_blank" class="btn-contato">Tenho Interesse</a>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Erro ao carregar catálogo:", error);
                document.getElementById('catalogo').innerHTML = '<p>Erro ao carregar as peças.</p>';
            }
        }

        carregarCatalogo();
    </script>
</body>
</html>
