<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>GoldControl - Coleção</title>
    <style>
        :root { --gold: #d4af37; --bg: #fafafa; }
        body { font-family: 'Playfair Display', serif; background: var(--bg); margin: 0; padding: 40px; }
        .header { text-align: center; margin-bottom: 50px; }
        .header h1 { color: var(--gold); font-size: 2.5rem; letter-spacing: 2px; }
        
        /* Grid de Cards */
        .vitrine { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
            max-width: 1200px; 
            margin: auto; 
        }

        .card { 
            background: white; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: transform 0.3s;
            text-align: center;
        }
        .card:hover { transform: translateY(-10px); }

        .card img { width: 100%; height: 250px; object-fit: cover; }
        
        .info { padding: 20px; }
        .info h3 { margin: 10px 0; color: #333; }
        .price { color: var(--gold); font-weight: bold; font-size: 1.2rem; }
        .details { font-size: 0.9rem; color: #777; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1>✨ Nossa Coleção Exclusiva</h1>
    <p>Peças únicas selecionadas para você</p>
</div>

<div class="vitrine" id="vitrine">
    </div>

<script>
    async function carregarVitrine() {
        const res = await fetch('http://localhost:8080/joias');
        const joias = await res.json();
        const vitrine = document.getElementById('vitrine');

        // Filtramos para mostrar apenas o que está DISPONÍVEL
        const disponiveis = joias.filter(j => j.status === 'DISPONIVEL');

        disponiveis.forEach(j => {
            vitrine.innerHTML += `
                <div class="card">
                    <img src="${j.fotoUrl || 'https://via.placeholder.com/300'}" alt="${j.nome}">
                    <div class="info">
                        <h3>${j.nome}</h3>
                        <p class="price">R$ ${j.precoFixo}</p>
                        <p class="details">${j.peso}g | ${j.descricao || ''}</p>
                    </div>
                </div>`;
        });
    }
    carregarVitrine();
</script>
</body>
</html>
